<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAI | Offline Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen flex items-center justify-center font-mono-ui text-[#111]">

    <div id="app-frame" class="phone-frame flex flex-col">
        <div class="phone-notch"></div>

        <header class="pt-10 pb-4 px-5 border-b-2 border-black bg-white flex justify-between items-end shrink-0">
            <div>
                <h1 class="text-2xl font-serif-heading font-black tracking-tight leading-none">Edu.AI</h1>
                <p class="text-[10px] uppercase font-bold tracking-widest mt-1">Offline V1.0</p>
            </div>
            
            <div class="flex flex-col items-end gap-2 shrink-0">
                <select id="ram-select" onchange="handleRAMChange()" class="text-[10px] bg-white border border-black px-1 py-0.5 outline-none font-bold cursor-pointer hover:bg-black hover:text-white transition-colors">
                    <option value="8">8GB RAM</option>
                    <option value="6">6GB RAM</option>
                    <option value="4">4GB RAM</option>
                </select>
                <button id="network-btn" onclick="toggleNetwork()" class="text-[10px] border border-black px-2 py-0.5 font-bold flex items-center gap-1 hover:bg-gray-100 transition-colors">
                    <span id="network-dot" class="w-1.5 h-1.5 bg-black rounded-full"></span>
                    <span id="network-text">OFFLINE</span>
                </button>
            </div>
        </header>

        <div id="screen-auth" class="flex-1 flex flex-col p-6 justify-center bg-white">
            <h2 class="text-3xl font-serif-heading font-black mb-2 border-b-2 border-black pb-2">Login.</h2>
            <p class="text-xs mb-8 font-bold text-gray-500">ACCESS LOCAL NEURAL ENGINE.</p>
            
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="Student ID" class="w-full p-3 border-2 border-black bg-white outline-none focus:bg-gray-100 text-sm font-bold">
                <input id="auth-pass" type="password" placeholder="Passcode" class="w-full p-3 border-2 border-black bg-white outline-none focus:bg-gray-100 text-sm font-bold">
                
                <button onclick="handleAuth('login')" class="w-full bg-black text-white font-bold py-3 uppercase tracking-widest text-sm hover:bg-white hover:text-black border-2 border-black transition-colors cursor-pointer">Authenticate</button>
            </div>
        </div>

        <div id="screen-dashboard" class="hidden flex-1 flex flex-col overflow-hidden bg-white">
            
            <div class="border-b-2 border-black bg-gray-100 p-3 overflow-x-auto whitespace-nowrap shrink-0" id="chapter-list">
                </div>

            <main class="flex-1 overflow-y-auto relative p-5">
                
                <div id="ai-loader" class="hidden absolute inset-0 bg-white/95 z-50 flex flex-col items-center justify-center border-t border-black">
                    <div class="spinner mb-4"></div>
                    <p id="loader-text" class="text-xs uppercase font-bold tracking-widest text-center px-4">Processing...</p>
                </div>

                <div id="view-empty" class="h-full flex flex-col items-center justify-center text-center opacity-40">
                    <span class="text-4xl mb-4">📖</span>
                    <p class="text-xs uppercase font-bold tracking-widest">Select a chapter<br>to begin.</p>
                </div>

                <div id="view-main" class="hidden">
                    <h2 id="chapter-title" class="text-xl font-serif-heading font-black mb-4 leading-tight"></h2>
                    
                    <div class="grid grid-cols-3 gap-2 mb-6 pb-6 border-b-2 border-black border-dashed">
                        <button onclick="fetchSummary()" class="border-2 border-black py-2 text-[10px] font-bold uppercase hover:bg-black hover:text-white transition-colors cursor-pointer">Summary</button>
                        <button id="btn-mindmap" onclick="fetchMindmap()" class="border-2 border-black py-2 text-[10px] font-bold uppercase hover:bg-black hover:text-white transition-colors disabled:opacity-20 disabled:cursor-not-allowed group relative cursor-pointer">
                            Mindmap
                            <span class="hidden group-disabled:block absolute -bottom-8 left-1/2 -translate-x-1/2 bg-black text-white text-[8px] p-1 whitespace-nowrap z-10">6GB RAM Req.</span>
                        </button>
                        <button onclick="fetchQuiz()" class="border-2 border-black py-2 text-[10px] font-bold uppercase hover:bg-black hover:text-white transition-colors cursor-pointer">Quiz</button>
                    </div>

                    <div id="ai-content-box" class="text-sm leading-relaxed pb-10"></div>
                </div>
            </main>
        </div>
    </div>

    <div class="fixed bottom-6 right-6 z-[100]">
        <button onclick="toggleDevice()" class="bg-black text-white px-5 py-3 font-bold text-[10px] uppercase tracking-widest border-2 border-black hover:bg-white hover:text-black transition-colors shadow-[6px_6px_0px_rgba(0,0,0,0.2)] active:translate-y-1 active:shadow-[2px_2px_0px_rgba(0,0,0,0.2)] cursor-pointer">
            🖥️ / 📱 Toggle View
        </button>
    </div>

    <script src="app.js"></script>
</body>
</html>
