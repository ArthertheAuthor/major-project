<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAI | Offline Intelligent Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans">

    <nav class="border-b border-slate-800 bg-[#1e293b]/80 backdrop-blur-md p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-white shadow-lg shadow-blue-900/20">E</div>
                <h1 class="text-xl font-bold tracking-tight">Edu<span class="text-blue-500">AI</span></h1>
                <span class="text-[10px] bg-blue-500/10 text-blue-400 px-2 py-1 rounded border border-blue-400/20 ml-2 font-mono uppercase">Offline V1</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="user-display" class="text-sm text-slate-400 font-medium">Guest Mode</span>
            </div>
        </div>
    </nav>

    <div id="screen-auth" class="flex flex-col items-center justify-center pt-24 px-4">
        <div class="bg-[#1e293b] p-10 rounded-3xl border border-slate-700 shadow-2xl w-full max-w-md">
            <h2 class="text-3xl font-bold text-white mb-2 text-center">Neural Access</h2>
            <p class="text-slate-400 text-center mb-8 text-sm">Initialize your local offline session.</p>
            
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 ml-1 uppercase">Email Address</label>
                    <input id="auth-email" type="email" placeholder="student@edu.ai" 
                        class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-blue-500 outline-none transition-all text-white">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500 ml-1 uppercase">Password</label>
                    <input id="auth-pass" type="password" placeholder="••••••••" 
                        class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-blue-500 outline-none transition-all text-white">
                </div>
                
                <div class="pt-4 space-y-3">
                    <button onclick="handleAuth('login')" 
                        class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-600/20 active:scale-95">
                        Login
                    </button>
                    
                    <button onclick="handleAuth('register')" 
                        class="w
